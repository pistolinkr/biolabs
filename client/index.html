<!doctype html>
<html lang="en" suppressHydrationWarning>

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Biolabs - Next-Generation Bio Simulation Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
    href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved =
            stored === "dark" || stored === "light" ? stored : prefersDark ? "dark" : "light";
          var root = document.documentElement;
          root.classList.remove("light", "dark");
          root.classList.add(resolved);
          var localeRaw = localStorage.getItem("biolabs.locale.v1");
          var localePref = "auto";
          if (localeRaw) {
            try {
              localePref = JSON.parse(localeRaw).uiLocale || "auto";
            } catch (e) {}
          }
          var langs = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || "en"];
          var map = { en: "en", ko: "ko", ja: "ja", zh: "zh-Hans", de: "de", fr: "fr", es: "es" };
          var resolvedLang = "en";
          if (localePref !== "auto" && map[localePref]) {
            resolvedLang = map[localePref];
          } else {
            for (var i = 0; i < langs.length; i++) {
              var primary = String(langs[i]).toLowerCase().split("-")[0];
              if (map[primary] && primary !== "en") {
                resolvedLang = map[primary];
                break;
              }
            }
          }
          root.lang = resolvedLang;
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
